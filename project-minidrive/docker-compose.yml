services:

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/templates:/usr/share/nginx/html

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - minio
      - postgres
    volumes:
      - ./backend/templates:/app/templates  # kalau mau live update template

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
         - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: minio
      POSTGRES_PASSWORD: minio123
      POSTGRES_DB: minidrive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  minio_data:
  postgres_data:
