<!DOCTYPE html>

<title>MiniDrive User Upload</title>
</head>

<body>

<h2>Create User</h2>

<form action="/users" method="post" enctype="multipart/form-data">

<input type="text" name="name"><br><br>

<button type="submit">Submit</button> 
  </form>

</body>
</html>
